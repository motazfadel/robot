services:
  ollama:
    image: ollama/ollama:latest
    container_name: joe-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: joe-ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      sleep 8 &&
      ollama pull ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

volumes:
  ollama_data:

